version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: hotel_system_db
    environment:
      POSTGRES_USER: hotel_admin
      POSTGRES_PASSWORD: hotel_password
      POSTGRES_DB: hotel_db
    ports:
      - "5432:5432"
    volumes:
      - hotel_db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  hotel_db_data:
